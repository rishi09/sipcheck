name: Product Screenshot Baseline

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: product-screenshot-baseline
  cancel-in-progress: true

jobs:
  capture:
    runs-on: macos-15
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Select latest Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Generate stub Secrets.swift
        run: |
          cat > SipCheck/Secrets.swift <<'EOF'
          import Foundation

          enum Secrets {
              static let openAIAPIKey = ""
              static let manusAPIKey = ""
              static let geminiAPIKey = ""
          }
          EOF

      - name: Install AXe
        env:
          HOMEBREW_NO_AUTO_UPDATE: "1"
        run: brew install cameroncooke/axe/axe

      - name: Pick and boot a Pro simulator
        id: sim
        run: |
          UDID=$(python3 <<'PY'
          import json, subprocess, sys

          data = json.loads(subprocess.run(
              ["xcrun", "simctl", "list", "devices", "available", "-j"],
              capture_output=True, text=True, check=True).stdout)["devices"]
          preferred = [
              "iPhone 17 Pro", "iPhone 16 Pro", "iPhone 15 Pro",
              "iPhone 17 Pro Max", "iPhone 16 Pro Max", "iPhone 15 Pro Max",
          ]
          runtimes = sorted(
              ((tuple(int(p) for p in runtime.rsplit("iOS-", 1)[-1].split("-") if p.isdigit()), runtime)
               for runtime in data if "iOS" in runtime),
              reverse=True,
          )
          for _version, runtime in runtimes:
              available = {d["name"]: d["udid"] for d in data[runtime] if d.get("isAvailable")}
              for name in preferred:
                  if name in available:
                      print(available[name])
                      sys.exit(0)
          sys.exit("No preferred Pro iPhone simulator is available")
          PY
          )
          echo "udid=$UDID" >> "$GITHUB_OUTPUT"
          xcrun simctl boot "$UDID" || true
          xcrun simctl bootstatus "$UDID" -b
          xcrun simctl ui "$UDID" appearance dark
          xcrun simctl status_bar "$UDID" override \
            --time "9:41" --batteryState charged --batteryLevel 100 \
            --wifiBars 3 --cellularBars 4 || true

      - name: Build shipping UI for simulator
        run: |
          set -o pipefail
          xcodebuild \
            -project SipCheck.xcodeproj \
            -scheme SipCheck \
            -configuration Release \
            -destination "platform=iOS Simulator,id=${{ steps.sim.outputs.udid }}" \
            -derivedDataPath DerivedData \
            build | tee build.log

      - name: Install app and fixture media
        run: |
          APP=$(find DerivedData/Build/Products/Release-iphonesimulator \
            -maxdepth 1 -name "*.app" | head -1)
          test -n "$APP"
          xcrun simctl uninstall "${{ steps.sim.outputs.udid }}" com.rishishah.sipcheck || true
          xcrun simctl install "${{ steps.sim.outputs.udid }}" "$APP"
          xcrun simctl addmedia "${{ steps.sim.outputs.udid }}" \
            TestAssets/BeerPhotos/sample-tap-menu.png

      - name: Capture product baseline
        run: |
          python3 scripts/capture_product_baseline.py \
            --udid "${{ steps.sim.outputs.udid }}" \
            --output baseline

      - name: Upload baseline
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: product-screenshot-baseline-${{ github.sha }}
          path: |
            baseline
            build.log
          if-no-files-found: error
          retention-days: 30
