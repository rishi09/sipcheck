# E2E Drive — interactive simulator session, remote-controlled over git.
#
# Boots a simulator, builds and launches SipCheck, then runs
# scripts/ci_bridge.py: it posts the current screen (screenshot + AXe
# accessibility dump) to the `e2e-bridge-state` branch and executes command
# batches pushed to the `e2e-bridge-cmd` branch (tap/type/swipe/launch...).
# This lets a remote Claude Code session read the screen, decide, and act —
# using the app like a person, one interaction round-trip at a time.
#
# Uses NO secrets: Secrets.swift is stubbed; the app is exercised with mock
# launch args by default (overridable via the launch_args input).
name: E2E Drive

on:
  workflow_dispatch:
    inputs:
      minutes:
        description: "Interactive session length in minutes"
        default: "40"
      launch_args:
        description: "App launch arguments"
        default: "--mock-ai --seed-data --isolated-storage"
  # Git-based dispatch: pushing a change to .drive/request.json starts a
  # session (the GitHub integration used by remote sessions lacks
  # actions:write, so it cannot use workflow_dispatch directly).
  push:
    branches: ["claude/**"]
    paths: [".drive/request.json"]

permissions:
  contents: write # bridge state/cmd branches

concurrency:
  group: e2e-drive
  cancel-in-progress: true

jobs:
  drive:
    runs-on: macos-15
    timeout-minutes: 75
    steps:
      - uses: actions/checkout@v4

      - name: Resolve session config (inputs or .drive/request.json)
        id: cfg
        run: |
          M="${{ inputs.minutes }}"
          A="${{ inputs.launch_args }}"
          if [ -f .drive/request.json ]; then
            [ -z "$M" ] && M=$(python3 -c "import json; print(json.load(open('.drive/request.json')).get('minutes', 40))")
            [ -z "$A" ] && A=$(python3 -c "import json; print(json.load(open('.drive/request.json')).get('launch_args', ''))")
          fi
          echo "minutes=${M:-40}" >> "$GITHUB_OUTPUT"
          echo "args=${A:---mock-ai --seed-data --isolated-storage}" >> "$GITHUB_OUTPUT"

      - name: Select latest Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Generate stub Secrets.swift
        run: |
          cat > SipCheck/Secrets.swift <<'EOF'
          import Foundation

          enum Secrets {
              static let openAIAPIKey = ""
              static let manusAPIKey = ""
              static let geminiAPIKey = ""
          }
          EOF

      - name: Install AXe (simulator UI driver)
        env:
          HOMEBREW_NO_AUTO_UPDATE: "1"
        run: |
          brew install cameroncooke/axe/axe
          axe --version || true

      - name: Pick and boot a simulator
        id: sim
        run: |
          UDID=$(python3 <<'PY'
          import json, subprocess, sys
          out = subprocess.run(
              ["xcrun", "simctl", "list", "devices", "available", "-j"],
              capture_output=True, text=True, check=True).stdout
          data = json.loads(out)["devices"]
          candidates = []
          for runtime, devices in data.items():
              if "iOS" not in runtime:
                  continue
              ver = tuple(int(p) for p in runtime.rsplit("iOS-", 1)[-1].split("-") if p.isdigit())
              for d in devices:
                  if d.get("isAvailable") and d["name"].startswith("iPhone"):
                      candidates.append((ver, d["name"], d["udid"]))
          candidates.sort()
          if not candidates:
              sys.exit("no available iPhone simulator found")
          ver, name, udid = candidates[-1]
          vs = ".".join(map(str, ver))
          print(f"picked {name} (iOS {vs}) {udid}", file=sys.stderr)
          print(udid)
          PY
          )
          echo "udid=$UDID" >> "$GITHUB_OUTPUT"
          xcrun simctl boot "$UDID" || true
          xcrun simctl bootstatus "$UDID" -b

      - name: Build SipCheck for simulator
        run: |
          set -o pipefail
          xcodebuild \
            -project SipCheck.xcodeproj \
            -scheme SipCheck \
            -configuration Debug \
            -destination "platform=iOS Simulator,id=${{ steps.sim.outputs.udid }}" \
            -derivedDataPath DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            build > build.log 2>&1 || { tail -100 build.log; exit 1; }
          tail -5 build.log

      - name: Install and launch app
        run: |
          APP=$(find DerivedData/Build/Products/Debug-iphonesimulator -maxdepth 1 -name "*.app" | head -1)
          echo "installing $APP"
          xcrun simctl install "${{ steps.sim.outputs.udid }}" "$APP"
          xcrun simctl launch "${{ steps.sim.outputs.udid }}" com.rishishah.sipcheck ${{ steps.cfg.outputs.args }}
          sleep 3

      - name: Run interactive bridge
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          python3 scripts/ci_bridge.py \
            --udid "${{ steps.sim.outputs.udid }}" \
            --minutes "${{ steps.cfg.outputs.minutes }}"
