name: TestFlight

on:
  push:
    branches: [main, claude/review-project-status-5ihff]
  workflow_dispatch:

concurrency:
  group: testflight-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Gate the build on the App Store Connect secrets existing, so pushes don't
  # fail loudly before the one-time secret setup is done. Runs on cheap Linux.
  check-secrets:
    runs-on: ubuntu-latest
    outputs:
      ready: ${{ steps.check.outputs.ready }}
    steps:
      - id: check
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
        run: |
          if [ -n "$ASC_KEY_ID" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::warning::App Store Connect secrets not set yet. Add ASC_KEY_ID, ASC_ISSUER_ID, and ASC_KEY_CONTENT under Settings → Secrets and variables → Actions, then re-run. Skipping the TestFlight build for now."
          fi

  testflight:
    needs: check-secrets
    if: needs.check-secrets.outputs.ready == 'true'
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"

      - name: Install fastlane
        run: bundle install

      # Secrets.swift is gitignored and absent from a clean checkout, but it is a
      # required compile input. Generate it from GitHub secrets (empty string when
      # a key isn't set — the app still builds and degrades gracefully).
      - name: Generate Secrets.swift
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          MANUS_API_KEY: ${{ secrets.MANUS_API_KEY }}
        run: |
          cat > SipCheck/Secrets.swift <<EOF
          import Foundation

          enum Secrets {
              static let openAIAPIKey = "${OPENAI_API_KEY}"
              static let manusAPIKey = "${MANUS_API_KEY}"
              static let geminiAPIKey = "${GEMINI_API_KEY}"
          }
          EOF
          echo "Wrote SipCheck/Secrets.swift (openAI set: $([ -n "$OPENAI_API_KEY" ] && echo yes || echo no), gemini set: $([ -n "$GEMINI_API_KEY" ] && echo yes || echo no))"

      - name: Build and upload to TestFlight
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_CONTENT: ${{ secrets.ASC_KEY_CONTENT }}
        run: bundle exec fastlane beta

      # Concise failure diagnostics: gym's console error is captured by the job log
      # tail directly; here we only grep the IDEDistribution log for error lines so
      # the actual cause isn't buried under thousands of entitlement-eval lines.
      - name: Dump signing/export errors on failure
        if: failure()
        run: |
          echo "===== gym log tail ====="
          shopt -s nullglob
          for f in ~/Library/Logs/gym/*.log; do
            echo "----- $f -----"; tail -50 "$f" 2>/dev/null
          done
          echo "===== IDEDistribution error lines ====="
          find ~/Library/Developer/Xcode /var/folders "$TMPDIR" -iname "IDEDistribution*.log" 2>/dev/null \
            | while read -r f; do
                echo "----- $f -----"
                grep -iE "error|denied|cannot|unable|fail|forbidden|not permitted|invalid|missing| 4[0-9][0-9] " "$f" 2>/dev/null | tail -30
              done
          echo "===== done ====="
